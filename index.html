<style>
  :root {

<div class="app">

<script>
/* ══════════════════════════════════════════════════════════════
   API CONFIGURATION
   Primary: OpenRouter (multiple model fallbacks)
   Secondary: MiniMax (if all OpenRouter models fail)
   ══════════════════════════════════════════════════════════════ */
const OPENROUTER_KEY = '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';
const OPENROUTER_URL = 'https://openrouter.ai/api/v1/chat/completions';
// Confirmed free models from openrouter.ai/collections/free-models (April 2026)
const OPENROUTER_MODELS = [
  'qwen/qwen3.6-plus:free',
  'meta-llama/llama-3.3-70b-instruct:free',
  'openai/gpt-oss-120b:free',
  'nvidia/nemotron-3-super-120b-a12b:free',
  'minimax/minimax-m2.5:free',
  'stepfun/step-3.5-flash:free',
  'openrouter/free'
];

const MINIMAX_KEY = 'sk-api-8rqD12zh7Mx0sbaV_8no3pEWSG2ncnwEi0SOginreZT_ChW6YYkrNILnwslad4iKSqV1tI-VnJjO2m6qM8hljmm0aeEnynD28K57sxwWHnhQBi5YFfTTXgY';
const MINIMAX_URL = 'https://api.minimax.io/v1/text/chatcompletion_v2';
const MINIMAX_MODEL = 'MiniMax-M2.5';

let generatedHTML = '';
let openRouterDisabled = false; // Set true on 401/402 to skip for remaining articles

(function init() {
  document.getElementById('newsletterDate').value = new Date().toISOString().split('T')[0];
  const c = document.getElementById('linkInputs');
  for (let i = 1; i <= 10; i++) {

      <div class="link-status" id="status${i}"></div>`;
    c.appendChild(r);

})();

function log(msg, type = '') {
  const el = document.getElementById('log');
  el.classList.add('active');
  const e = document.createElement('div');

  e.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.appendChild(e);
  el.scrollTop = el.scrollHeight;
}
function setProgress(p) {
  document.getElementById('progressBar').classList.add('active');
  document.getElementById('progressFill').style.width = p + '%';
}
function setStatus(i, s) {
  document.getElementById(`status${i}`).className = `link-status ${s}`;
}

/* ══════════════════════════════════════════════════════════════
   ROBUST JSON EXTRACTION
   Handles models that wrap JSON in prose, markdown, or thinking tags
   ══════════════════════════════════════════════════════════════ */
function extractJSON(text) {
  // Strip markdown fences
  text = text.replace(/```json\s*/gi, '').replace(/```\s*/gi, '').trim();
  // Strip <think>...</think> blocks (deepseek-r1 style)
  text = text.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();

  // Try direct parse first
  try { return JSON.parse(text); } catch (_) {}

  // Try to find a JSON object in the text
  const match = text.match(/\{[\s\S]*?"title"[\s\S]*?"description"[\s\S]*?\}/);
  if (match) {
    try { return JSON.parse(match[0]); } catch (_) {}
  }

  // Last resort: find any {...}
  const braceMatch = text.match(/\{[^{}]*\}/);
  if (braceMatch) {
    try { return JSON.parse(braceMatch[0]); } catch (_) {}
  }

  return null;
}

/* ══════════════════════════════════════════════════════════════
   IMAGE + TITLE EXTRACTION
   Uses dedicated link-preview / metadata APIs (not raw CORS proxies).
   These services are built to return og:image — no CORS issues.
   ══════════════════════════════════════════════════════════════ */

async function fetchWithTimeout(url, opts = {}, ms = 10000) {
  const ctrl = new AbortController();
  const id = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, { ...opts, signal: ctrl.signal });
    clearTimeout(id);
    return r;
  } catch (e) {
    clearTimeout(id);
    throw e;
  }
}

async function extractMetadata(url) {
  // Strategy 1: jsonlink.io
  try {
    const resp = await fetchWithTimeout(
      `https://jsonlink.io/api/extract?url=${encodeURIComponent(url)}`
    );
    if (resp.ok) {
      const data = await resp.json();
      const img = data.images?.[0] || '';
      const title = data.title || '';
      if (img || title) return { ogImage: img, ogTitle: title };
    }
  } catch (_) {}

  // Strategy 2: microlink.io
  try {
    const resp = await fetchWithTimeout(
      `https://api.microlink.io/?url=${encodeURIComponent(url)}`
    );
    if (resp.ok) {
      const data = await resp.json();
      const img = data.data?.image?.url || '';
      const title = data.data?.title || '';
      if (img || title) return { ogImage: img, ogTitle: title };
    }
  } catch (_) {}

  // Strategy 3: allorigins
  try {
    const resp = await fetchWithTimeout(
      `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`
    );
    if (resp.ok) {
      const json = await resp.json();
      const html = json.contents || '';
      if (html.length > 200) {
        const result = parseOgFromHTML(html);
        if (result.ogImage || result.ogTitle) return result;
      }
    }
  } catch (_) { log(`    → allorigins: failed`); }

  // Strategy 4: corsproxy.io
  try {
    const resp = await fetchWithTimeout(
      `https://corsproxy.io/?${encodeURIComponent(url)}`
    );
    if (resp.ok) {
      const html = await resp.text();
      if (html.length > 200 && html.includes('<')) {
        const result = parseOgFromHTML(html);
        if (result.ogImage || result.ogTitle) return result;
      }
    }
  } catch (_) {}

  return { ogImage: '', ogTitle: '' };
}

function parseOgFromHTML(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');

  let ogImage = '';
  for (const sel of [
    'meta[property="og:image"]',
    'meta[name="og:image"]',
    'meta[property="og:image:url"]',
    'meta[name="twitter:image"]',
    'meta[property="twitter:image"]',
    'meta[name="twitter:image:src"]',
  ]) {
    const el = doc.querySelector(sel);
    if (el) {
      const v = (el.getAttribute('content') || '').trim();
      if (v && v.startsWith('http')) { ogImage = v; break; }
    }
  }

  let ogTitle = '';
  const tm = doc.querySelector('meta[property="og:title"]') || doc.querySelector('meta[name="og:title"]');
  if (tm) ogTitle = (tm.getAttribute('content') || '').trim();
  if (!ogTitle) {
    const t = doc.querySelector('title');
    if (t) ogTitle = t.textContent.trim();
  }

  return { ogImage, ogTitle };
}

/* ══════════════════════════════════════════════════════════════
   AI SUMMARY: OpenRouter (multi-model) → MiniMax fallback
   ══════════════════════════════════════════════════════════════ */

/* buildPrompt is now replaced by buildPromptWithContent inside getAISummary */

/* ══════════════════════════════════════════════════════════════
   FETCH PAGE TEXT — grab article body for richer AI context
   ══════════════════════════════════════════════════════════════ */
async function fetchPageText(url) {
  const proxies = [
    u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`
  ];
  for (const proxy of proxies) {
    try {
      const resp = await fetchWithTimeout(proxy(url), {}, 12000);
      if (!resp.ok) continue;
      let html = '';
      const ct = resp.headers.get('content-type') || '';
      if (ct.includes('json')) {
        const j = await resp.json();
        html = j.contents || '';
      } else {
        html = await resp.text();
      }
      if (html.length < 200) continue;
      // Strip tags, collapse whitespace, grab first ~1500 chars of body text
      const doc = new DOMParser().parseFromString(html, 'text/html');
      // Remove scripts/styles
      doc.querySelectorAll('script, style, nav, header, footer, aside').forEach(el => el.remove());
      const bodyText = (doc.body?.innerText || '').replace(/\s+/g, ' ').trim();
      if (bodyText.length > 100) return bodyText.slice(0, 1500);
    } catch (_) {}
  }
  return '';
}

function buildPromptWithContent(url, pageTitle, pageText) {
  const titleHint = pageTitle
    ? `The article title is: "${pageTitle}".`
    : 'Derive the topic from the URL slug.';

  const contentHint = pageText
    ? `\n\nHere is the article text (may be truncated):\n${pageText}`
    : '';

  return `You are a cybersecurity newsletter writer. Given this article URL and context, generate a JSON response with exactly these fields:
- "title": A concise, professional headline for the article. ${titleHint}
- "description": A 2-3 sentence professional summary of what this cybersecurity news is about. Write in third person, factual tone. Focus on: what happened, who is affected, and why it matters. Keep it under 80 words.

URL: ${url}${contentHint}

IMPORTANT: Return ONLY valid JSON, no markdown, no backticks, no explanation. Just the raw JSON object with "title" and "description" keys.`;
}

/* ══════════════════════════════════════════════════════════════
   AI CALL HELPERS — with per-model retry
   ══════════════════════════════════════════════════════════════ */
async function tryOpenRouterWithFallbacks(prompt) {
  // Use OpenRouter's native model fallback: one request, auto-tries all models
  // Plus response-healing plugin to auto-fix broken JSON from free models
  const resp = await fetchWithTimeout(OPENROUTER_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${OPENROUTER_KEY}`,
      'HTTP-Referer': 'https://cybersec-newsletter-gen.app',
      'X-OpenRouter-Title': 'CyberSec Newsletter Gen'
    },
    body: JSON.stringify({
      model: OPENROUTER_MODELS[0],
      models: OPENROUTER_MODELS,
      route: 'fallback',
      max_tokens: 500,
      temperature: 0.3,
      response_format: { type: 'json_object' },
      plugins: [{ id: 'response-healing' }],
      messages: [
        { role: 'system', content: 'You are a JSON API. You MUST respond with ONLY a valid JSON object. No markdown, no explanation, no thinking tags.' },
        { role: 'user', content: prompt },
        { role: 'assistant', content: '{' }
      ]
    })
  }, 30000);

  if (!resp.ok) {
    const retryable = resp.status === 429 || resp.status >= 500;
    let errMsg = `HTTP ${resp.status}`;
    try {
      const errData = await resp.json();
      errMsg = errData.error?.message || errMsg;
    } catch (_) {}
    return { result: null, retryable, status: resp.status, errMsg };
  }

  const data = await resp.json();

  // Check for inline errors (200 status but error in body)
  const choiceError = data.choices?.[0]?.error;
  if (choiceError) {
    return { result: null, retryable: true, status: choiceError.code, errMsg: choiceError.message };
  }

  let text = data.choices?.[0]?.message?.content?.trim() || '';
  // Assistant prefill started with '{', so prepend it if the model continued from there
  if (text && !text.startsWith('{')) text = '{' + text;
  if (!text) return { result: null, retryable: false, errMsg: 'Empty response' };

  const usedModel = data.model || 'unknown';
  const result = extractJSON(text);
  return {
    result: (result && result.title && result.description) ? result : null,
    retryable: false,
    usedModel
  };
}

async function tryMiniMax(prompt, epUrl) {
  const resp = await fetchWithTimeout(epUrl, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${MINIMAX_KEY}`
    },
    body: JSON.stringify({
      model: MINIMAX_MODEL,
      max_tokens: 500,
      temperature: 0.3,
      messages: [{ role: 'user', content: prompt }]
    })
  }, 20000);

  if (!resp.ok) return null;

  const data = await resp.json();
  const text = data.choices?.[0]?.message?.content?.trim()
            || data.output?.text?.trim()
            || '';
  if (!text) return null;

  const result = extractJSON(text);
  return (result && result.title && result.description) ? result : null;
}

/* ══════════════════════════════════════════════════════════════
   MAIN AI SUMMARY — with page scraping, retries & final fallback
   ══════════════════════════════════════════════════════════════ */
async function getAISummary(url, pageTitle, hasImage) {
  // Fetch page content for richer prompts
  let pageText = '';
  try { pageText = await fetchPageText(url); } catch (_) {}

  const prompt = buildPromptWithContent(url, pageTitle, pageText);

  // ── Pass 1: OpenRouter with native model fallback + response-healing ──
  // One API call automatically tries all models in the list
  if (!openRouterDisabled) {
    for (let attempt = 0; attempt < 2; attempt++) {
      try {
        const { result, retryable, status, errMsg, usedModel } = await tryOpenRouterWithFallbacks(prompt);
        if (result) {
          if (usedModel) log(`    → Used model: ${usedModel}`);
          return result;
        }
        // 401/402 = auth/credits problem — skip OpenRouter for rest of session
        if (status === 401 || status === 402) {
          log(`    → OpenRouter: ${errMsg} — disabling for this session`, 'error');
          openRouterDisabled = true;
          break;
        }
        if (retryable && attempt === 0) {
          log(`    → OpenRouter: ${errMsg || status}, retrying in 3s...`);
          await new Promise(r => setTimeout(r, 3000));
          continue;
        }
        log(`    → OpenRouter failed: ${errMsg || 'no valid JSON'}`, 'error');
        break;
      } catch (e) {
        log(`    → OpenRouter error: ${e.message}`, 'error');
        break;
      }
    }
  }

  // ── Pass 2: MiniMax fallback ──
  const MINIMAX_ENDPOINTS = [
    'https://api.minimax.io/v1/chat/completions',
    MINIMAX_URL
  ];
  for (const epUrl of MINIMAX_ENDPOINTS) {
    try {
      const result = await tryMiniMax(prompt, epUrl);
      if (result) return result;
    } catch (_) {}
  }

  // ── Pass 3: OpenRouter retry with simpler prompt (skip if auth broken) ──
  if (!openRouterDisabled) {
    log('    → All providers failed, retrying with simpler prompt...', 'info');
    const simplePrompt = pageTitle
      ? `Write a 2-3 sentence cybersecurity newsletter summary for this article titled "${pageTitle}" (URL: ${url}).${pageText ? ' Article excerpt: ' + pageText.slice(0, 800) : ''} Return ONLY a JSON object like {"title":"...","description":"..."}.`
      : `Write a 2-3 sentence cybersecurity newsletter summary for this article: ${url}. Return ONLY a JSON object like {"title":"...","description":"..."}.`;

    try {
      const resp = await fetchWithTimeout(OPENROUTER_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${OPENROUTER_KEY}`,
          'HTTP-Referer': 'https://cybersec-newsletter-gen.app',
          'X-OpenRouter-Title': 'CyberSec Newsletter Gen'
        },
        body: JSON.stringify({
          model: OPENROUTER_MODELS[0],
          models: OPENROUTER_MODELS,
          route: 'fallback',
          max_tokens: 500,
          temperature: 0.5,
          plugins: [{ id: 'response-healing' }],
          messages: [{ role: 'user', content: simplePrompt }]
        })
      }, 30000);
      if (resp.ok) {
        const data = await resp.json();
        const text = data.choices?.[0]?.message?.content?.trim();
        if (text) {
          const result = extractJSON(text);
          if (result && result.title && result.description) return result;
        }
      }
    } catch (_) {}
  }

  // ── Pass 4: Generate a smart fallback from page text / title ──
  log('    → Generating fallback summary from metadata...', 'info');
  if (pageTitle || pageText) {
    const title = pageTitle || 'Security Advisory';
    let description = '';
    if (pageText && pageText.length > 100) {
      const sentences = pageText.match(/[A-Z][^.!?]*[.!?]/g) || [];
      const good = sentences.filter(s => s.length > 30 && s.length < 300).slice(0, 2);
      if (good.length) {
        description = good.join(' ').trim();
        if (description.length > 350) description = description.slice(0, 347) + '...';
      }
    }
    if (!description) {
      description = `This article covers ${title.toLowerCase().replace(/^[\W]+/, '')}. Organizations should review the details and assess potential impact on their security posture.`;
    }
    return { title, description };
  }

  throw new Error('All AI providers failed');
}

function formatDate(ds) {
  return new Date(ds + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

async function generate() {
  const links = [];
  for (let i = 1; i <= 10; i++) {
    const v = document.getElementById(`link${i}`).value.trim();
    if (v) links.push({ url: v, index: i });
  }
  if (!links.length) { log('No links entered.', 'error'); return; }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true; btn.textContent = 'Generating...';
  document.getElementById('downloadBtn').disabled = true;
  document.getElementById('copyBtn').disabled = true;

  log(`Processing ${links.length} articles...`, 'info');
  setProgress(5);
  openRouterDisabled = false; // Reset for each new generation

  const stories = [];

  for (let i = 0; i < links.length; i++) {
    const { url, index } = links[i];
    setStatus(index, 'processing');

    let ogImage = '', ogTitle = '';

    // STEP 1: Extract thumbnail + title via metadata APIs
    try {
      const meta = await extractMetadata(url);
      ogImage = meta.ogImage;
      ogTitle = meta.ogTitle;
    } catch (e) {}

    // STEP 2: AI for title + description only
    try {
      const ai = await getAISummary(url, ogTitle, !!ogImage);
      stories.push({
        url,
        title: ai.title || ogTitle || 'Article ' + index,
        description: ai.description || 'Summary could not be generated.',
        imageUrl: ogImage
      });
      setStatus(index, 'done');
      log(`[${i+1}/${links.length}] ✓ ${ogImage ? '🖼️' : '⬜'} "${ai.title || ogTitle}"`, 'success');
    } catch (err) {
      setStatus(index, 'error');
      log(`[${i+1}/${links.length}] ⚠ AI failed, using metadata fallback: ${ogTitle || url}`, 'error');
      // Even on total failure, try to build something useful from the title
      let fallbackDesc = 'Summary generation failed.';
      if (ogTitle) {
        fallbackDesc = `This article covers ${ogTitle.toLowerCase().replace(/^[\W]+/, '')}. Review the full article for details on the security implications.`;
      }
      stories.push({ url, title: ogTitle || 'Article ' + index, description: fallbackDesc, imageUrl: ogImage });
    }

    setProgress(5 + ((i+1) / links.length) * 90);
    if (i < links.length - 1) {
      await new Promise(r => setTimeout(r, 2000));
    }
  }

  generatedHTML = buildNewsletterHTML(stories);

  document.getElementById('previewSection').classList.add('active');
  document.getElementById('previewFrame').srcdoc = generatedHTML;
  document.getElementById('rawHtml').value = generatedHTML;

  setProgress(100);
  log(`Done! ${stories.length} stories generated.`, 'success');

  btn.disabled = false; btn.textContent = 'Regenerate';
  document.getElementById('downloadBtn').disabled = false;
  document.getElementById('copyBtn').disabled = false;
}

function downloadHTML() {
  if (!generatedHTML) return;
  const n = document.getElementById('newsletterNum').value || '194';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([generatedHTML], { type: 'text/html' }));
  a.download = `Newsletter_${n}.html`; a.click();
  log('Downloaded.', 'success');
}

function copyHTML() {
  if (!generatedHTML) return;
  navigator.clipboard.writeText(generatedHTML).then(() => {
    log('Copied to clipboard.', 'success');
    const b = document.getElementById('copyBtn');
    b.textContent = 'Copied!'; setTimeout(() => b.textContent = 'Copy HTML', 2000);
  });
}
